# Vollstaendig aufgeloeste Abhaengigkeiten fuer Python 3.11 -- auf Windows-Dev
# aufgeloest, Linux-only-Pakete manuell ergaenzt; sauber waere Neuerzeugung in
# einem Linux-CI-Job.
#
# Bekannte manuelle Korrekturen gegenueber dem Windows-Resolve:
# - uvloop fehlte komplett (Windows-Resolver zieht es nie, uvicorn[standard]
#   braucht es aber auf Linux/Mac fuer den schnellen Event-Loop). Manuell
#   ergaenzt mit Plattform-Marker, analog zu colorama (win32-Pendant).
# - pytest/httpx (nur fuer Tests, siehe requirements-dev.txt) sowie ihre
#   ausschliesslich von ihnen gezogenen transitiven Pakete (pluggy, iniconfig,
#   httpcore, idna, certifi) wurden manuell entfernt, damit sie nicht im
#   Produktions-Image landen. h11/anyio bleiben drin: die werden von
#   uvicorn/Starlette zur Laufzeit gebraucht, nicht nur von httpx.
# Aktualisieren: `pip install --dry-run --ignore-installed --only-binary=:all:
# --python-version 3.11 --report ... -r requirements.txt`, dann Tests + Audit.
