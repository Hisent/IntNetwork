name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - run: pip install -r requirements.lock
      # Blockierend: findet ungenutzte Importe, undefinierte Namen und
      # veraenderliche Default-Argumente. Konfiguration in backend/pyproject.toml.
      - run: pip install ruff && ruff check .
      - run: pytest
      - run: python -m pytest ../runner/tests
      # Ein neuer Advisory stoppt den Merge: die Lock-Datei macht den Befund
      # reproduzierbar und verhindert, dass ein Deploy ihn stillschweigend uebernimmt.
      - run: pip install pip-audit && pip-audit -r requirements.lock

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # War konfiguriert (package.json "lint": "oxlint"), lief aber nie in CI.
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm audit --omit=dev

  # Baut alle drei Images ohne Push. Ohne diesen Job faellt ein kaputtes
  # Dockerfile (z.B. durch eine neue Paketinstallation im Runner) erst beim
  # Deploy auf, nicht schon in CI.
  docker-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build ./backend
      - run: docker build ./frontend
      - run: docker build ./runner

  # Deckt den Postgres-spezifischen Pfad aus app/db_migrate.py ab (Advisory-Lock,
  # lock_timeout) -- der Job "backend" oben laeuft nur gegen SQLite. Bewusst
  # schlank gehalten: nur run_migrations() gegen einen echten Postgres-Service,
  # nicht die ganze Testsuite (die ist bereits im "backend"-Job abgedeckt).
  backend-postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: intnetwork
          POSTGRES_USER: intnetwork
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U intnetwork -d intnetwork"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - run: pip install -r requirements.lock
      - name: run_migrations() gegen echtes Postgres (Advisory-Lock, lock_timeout)
        env:
          DATABASE_URL: postgresql://intnetwork:testpass@localhost:5432/intnetwork
          SECRET_KEY: ci-postgres-secret-not-the-default-0123456789
        run: python -c "from app.db_migrate import run_migrations; run_migrations(); print('OK: Migrationen liefen gegen Postgres durch')"
