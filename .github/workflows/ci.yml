name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      # Blockierend: findet ungenutzte Importe, undefinierte Namen und
      # veraenderliche Default-Argumente. Konfiguration in backend/pyproject.toml.
      - run: pip install ruff && ruff check .
      - run: pytest
      - run: python -m pytest ../runner/tests
      # Sicherheitsscan der gepinnten Abhängigkeiten. Nicht blockierend, damit ein
      # neu gemeldeter Advisory nicht sofort den Merge stoppt — Ausgabe im Log prüfen.
      - run: pip install pip-audit && pip-audit -r requirements.txt
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # War konfiguriert (package.json "lint": "oxlint"), lief aber nie in CI.
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm audit --omit=dev
        continue-on-error: true
