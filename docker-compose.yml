services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: intnetwork
      POSTGRES_USER: intnetwork
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intnetwork -d intnetwork"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://intnetwork:${POSTGRES_PASSWORD}@db:5432/intnetwork
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Ansible-Lab: Pfad zur gemeinsamen Warteschlange. Leer lassen schaltet
      # das Lab ab (API antwortet 503), siehe docs/lab-sicherheit.md.
      LAB_QUEUE_DIR: ${LAB_QUEUE_DIR}
      # Welche Auftragsarten die Oberflaeche als nutzbar anbietet. MUSS von Hand
      # zu RUNNER_KINDS beim Runner passen — das Backend kann die Freigabe des
      # Runners nicht abfragen, es gibt keinen Netzweg dorthin. Steht hier eine
      # Art, die der Runner nicht freigegeben hat, bietet das Widget sie an und
      # der Lauf scheitert mit einer Runner-Meldung.
      LAB_KINDS: ${LAB_KINDS:-ansible}
      # Passkey-Anmeldung fuer Trainer. Beide Werte muessen der von aussen
      # sichtbaren Adresse entsprechen — hinter Traefik also der oeffentliche
      # Hostname, NICHT der Containername. Leer lassen schaltet die Funktion ab
      # (der Anmeldeknopf erscheint dann gar nicht erst).
      # ACHTUNG: Passkeys sind an die RP-ID gebunden. Ein Domainwechsel macht
      # alle registrierten Passkeys unbrauchbar, jeder Trainer muss dann neu
      # registrieren. Das Passwort bleibt in jedem Fall nutzbar.
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    # Gemeinsames Volume mit dem Runner: Auftraege rein, Ergebnisse raus.
    # Ein Netzweg zum Runner existiert bewusst NICHT (siehe unten).
    volumes:
      - lab_queue:/queue
    # ACHTUNG: KEINEN healthcheck für backend/frontend eintragen. Coolify routet
    # per Traefik ausschliesslich auf Container im Zustand "healthy" — ein Check,
    # der in dieser Umgebung anders ausfaellt als lokal gedacht, nimmt den Dienst
    # sofort komplett vom Netz ("no available server", Vorfall 2026-07-21). Wenn
    # Healthchecks doch gewuenscht sind: erst in Coolify gegen einen Test-Deploy
    # verifizieren, nicht blind hier eintragen.
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    # Bewusst KEIN "condition: service_healthy": kommt das Backend nicht hoch,
    # soll das Frontend trotzdem starten und die API-Fehler anzeigen. Sonst fehlt
    # dem Proxy jeder Container und der Nutzer sieht nur noch "no available
    # server" (genau so eskalierte der v1.24-Startup-Hänger zum Totalausfall).
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # Ansible-Lab-Runner: fuehrt Teilnehmer-Playbooks wirklich aus (siehe
  # runner/worker.py, dort steht das Bedrohungsmodell — bitte vor Aenderungen
  # lesen). Der Dienst hat KEIN Netzwerk: Auftraege kommen als Dateien ueber ein
  # gemeinsames Volume herein, Ergebnisse gehen genauso zurueck.
  runner:
    build:
      context: ./runner
    restart: unless-stopped
    # Der entscheidende Punkt. Ein Playbook ist ausfuehrbarer Code; mit einem
    # Netzwerkzugang koennte es Daten hinausschicken oder interne Dienste
    # ansprechen. Auf Coolify hat sich gezeigt, dass ein "internal"-Netz dafuer
    # NICHT reicht: Die Plattform haengt jeden Dienst zusaetzlich ins offene
    # Projekt-Netz, aus dem heraus Internet, Datenbank und Backend erreichbar
    # waren (geprueft am 2026-07-21). "none" ist die strukturelle Loesung: kein
    # Interface, keine Namensaufloesung, kein Socket. NICHT aendern, ohne die
    # Isolierung neu zu bewerten.
    network_mode: "none"
    volumes:
      - lab_queue:/queue
    environment:
      RUNNER_QUEUE_DIR: /queue
      # Harte Zeitgrenze je Playbook-Lauf in Sekunden.
      RUNNER_TIMEOUT: ${RUNNER_TIMEOUT:-30}
      # Wie viele Laeufe gleichzeitig laufen duerfen.
      RUNNER_MAX_PARALLEL: ${RUNNER_MAX_PARALLEL:-2}
      # Freigegebene Auftragsarten. Standard "ansible" — ohne Konfiguration
      # aendert sich nichts. Jede Art einzeln freizugeben ist der Punkt: ein
      # Durchlauf, der nur den PKI-Lehrgang faehrt, setzt hier "openssl" und
      # laesst "ansible" weg. Dann fuehrt der Container keinen frei geschriebenen
      # Code mehr aus, sondern nur ein Krypto-Werkzeug — strikt weniger als heute.
      # Muss zu LAB_KINDS beim Backend passen (siehe dort).
      RUNNER_KINDS: ${RUNNER_KINDS:-ansible}
    cap_drop:
      - ALL  # fuer "ansible-playbook -c local" wird keine Capability gebraucht
    security_opt:
      - no-new-privileges:true  # keine Rechteausweitung ueber SUID-Binaries
    read_only: true  # Root-Dateisystem nur lesbar; das Image bleibt unveraendert
    tmpfs:
      # Einziger Schreibort. Hier liegen die Arbeitsverzeichnisse der
      # Teilnehmenden; "noexec" verhindert eigene Binaerdateien.
      - /tmp:size=64m,mode=1777,noexec
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
          # Bremse gegen Fork-Bomben. Bewusst hier und nicht als top-level
          # "pids_limit": Coolify ergaenzt die deploy-Form selbst, und Compose
          # lehnt beide Schreibweisen mit unterschiedlichen Werten ab.
          pids: 128
    # ACHTUNG: KEIN healthcheck. Ein fehlschlagender Check hat am 2026-07-21
    # schon einen Ausfall verursacht (Traefik routet nur auf "healthy").

volumes:
  postgres_data:
  # Austauschverzeichnis Backend <-> Runner (siehe oben).
  lab_queue:

