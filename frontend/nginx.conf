server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Echte Client-IP aus der Proxy-Kette (Coolify/Traefik -> nginx -> Backend).
    # Ohne das ist request.client.host im Backend die Traefik-/nginx-IP, das
    # IP-basierte Rate-Limit (login/join/lab) griffe dann kollektiv statt pro
    # Client. real_ip_recursive geht die X-Forwarded-For-Kette von RECHTS durch,
    # ueberspringt die als vertrauenswuerdig markierten privaten Proxy-Hops und
    # nimmt die erste OEFFENTLICHE Adresse = die echte Client-IP.
    #
    # Sicher gegen Faelschung: Der Header wird nur ausgewertet, wenn die DIREKTE
    # Verbindung aus einem trusted (privaten) Netz kommt (also von Traefik im
    # Docker-Netz). Verbaende ein Client nginx direkt (oeffentliche Peer-IP),
    # wird der mitgeschickte X-Forwarded-For komplett ignoriert. Und selbst wenn
    # Traefik einen vom Client gefaelschten Wert anhaengt, steht der echte,
    # von Traefik ergaenzte Peer-Wert RECHTS davon und gewinnt. Ein
    # `X-Forwarded-For: <fake>` des Clients aendert die gewaehlte IP also nie.
    #
    # Wird der Ingress/das Netz-Layout geaendert, diese Annahme neu pruefen
    # (siehe docs/operations.md, Abschnitt Rate-Limit hinter Proxy).
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: SPA + API sind same-origin (nginx proxyt /api). Scripts nur aus eigener
    # Herkunft; Inline-Styles für React-Style-Attribute erlaubt.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # /api/* unverändert an das Backend weiterleiten (kein URI-Stripping)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        # $remote_addr ist hier dank real_ip (oben) bereits die echte Client-IP.
        # Bewusst NICHT $proxy_add_x_forwarded_for weiterreichen: das haengt den
        # vom Client mitgeschickten (potenziell gefaelschten) Header vorne an,
        # und uvicorn (--forwarded-allow-ips=*) naehme dann den linken, also
        # gefaelschten Wert. Ein einziger, bereinigter Wert schliesst das aus.
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_request_buffering on;
        proxy_buffering         on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
